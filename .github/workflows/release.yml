name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-latest
            arch: arm64
            bundler: bun
          - platform: darwin-x64
            os: macos-latest
            arch: x64
            bundler: bun
          - platform: linux-x64
            os: ubuntu-latest
            arch: x64
            bundler: bun
          - platform: win32-x64
            os: windows-latest
            arch: x64
            bundler: bun

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        # 用 pnpm 而非 bun install：pnpm 读 pnpm-workspace.yaml 的 supportedArchitectures，
        # 装齐 darwin/linux/win32 多平台 native，供 Bun.build 交叉编译各 target。
        # --no-frozen-lockfile：optionalDependencies 的 agent-skills-mesh-* 子包尚未发布（npm 404），
        # pnpm 无法写入 lockfile 致 frozen 校验失败；首次发布需放宽（optional 404 不阻断安装）。
        # 子包上线后，本地重新 install 生成含子包的 lockfile 并提交，即可改回 --frozen-lockfile。
        run: pnpm install --no-frozen-lockfile

      - name: Build ${{ matrix.platform }}
        run: bun run scripts/build-standalone.ts ${{ matrix.platform }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asm-${{ matrix.platform }}
          path: dist/standalone/${{ matrix.platform }}/asm${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # build job 上传的每个 artifact（asm-<plat>/asm[.exe]）下载到 artifacts/<name>/。
      # 暂存到 release.ts 期望的 dist/standalone/<plat>/asm[.exe]，供 --skip-build 组装子包。
      - name: Stage artifacts to dist/standalone
        shell: bash
        run: |
          set -e
          for plat in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            mkdir -p "dist/standalone/$plat"
          done
          mv artifacts/asm-darwin-arm64/asm  dist/standalone/darwin-arm64/asm
          mv artifacts/asm-darwin-x64/asm    dist/standalone/darwin-x64/asm
          mv artifacts/asm-linux-x64/asm     dist/standalone/linux-x64/asm
          mv artifacts/asm-win32-x64/asm.exe dist/standalone/win32-x64/asm.exe
          echo "=== staged dist/standalone ==="
          ls -R dist/standalone

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          bun run scripts/release.ts --skip-build --publish
