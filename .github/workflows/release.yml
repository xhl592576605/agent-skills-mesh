name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build all platforms
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        # pnpm 读 pnpm-workspace.yaml 的 supportedArchitectures，装齐 darwin/linux/win32 多平台 native。
        # --no-frozen-lockfile：optionalDependencies 的 agent-skills-mesh-* 子包尚未发布（npm 404），
        # pnpm 无法写入 lockfile 致 frozen 校验失败（每次发新版本都这样，非仅首次）。
        run: pnpm install --no-frozen-lockfile

      - name: Build 4 platforms (cross-compile on macOS)
        # 单 macOS runner 用 Bun.build({compile}) 交叉编译全部 4 平台。
        # 为何不用各平台原生 runner：ubuntu 原生 build linux-x64 时，bundle 阶段加载 host 的
        # @opentui/core-linux-x64 native 会触发 Bun "Bundle failed"；macOS host bundle 用 darwin
        # native 不触发。交叉编译已验证内嵌正确的 target native（libopentui.so/dylib/dll）。
        run: bun run scripts/build-standalone.ts darwin-arm64 darwin-x64 linux-x64 win32-x64
        shell: bash

      - name: Upload darwin-arm64
        uses: actions/upload-artifact@v4
        with:
          name: asm-darwin-arm64
          path: dist/standalone/darwin-arm64/asm

      - name: Upload darwin-x64
        uses: actions/upload-artifact@v4
        with:
          name: asm-darwin-x64
          path: dist/standalone/darwin-x64/asm

      - name: Upload linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: asm-linux-x64
          path: dist/standalone/linux-x64/asm

      - name: Upload win32-x64
        uses: actions/upload-artifact@v4
        with:
          name: asm-win32-x64
          path: dist/standalone/win32-x64/asm.exe

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # build job 上传的每个 artifact（asm-<plat>/asm[.exe]）下载到 artifacts/<name>/。
      # 暂存到 release.ts 期望的 dist/standalone/<plat>/asm[.exe]，供 --skip-build 组装子包。
      - name: Stage artifacts to dist/standalone
        shell: bash
        run: |
          set -e
          for plat in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            mkdir -p "dist/standalone/$plat"
          done
          mv artifacts/asm-darwin-arm64/asm  dist/standalone/darwin-arm64/asm
          mv artifacts/asm-darwin-x64/asm    dist/standalone/darwin-x64/asm
          mv artifacts/asm-linux-x64/asm     dist/standalone/linux-x64/asm
          mv artifacts/asm-win32-x64/asm.exe dist/standalone/win32-x64/asm.exe
          echo "=== staged dist/standalone ==="
          ls -R dist/standalone

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        # pnpm 安装 @opentui/core 的 peerDependencies（含 @babel/traverse），确保 Bun
        # 运行 release.ts 时 babel runtime 正常工作（避免 "_debug is not a function" 坑）。
        # --no-frozen-lockfile：发布当下 agent-skills-mesh-* 新版本尚未存在于 npm，
        # frozen 校验会因 optionalDependencies 与 lockfile 暂时不一致而失败。
        run: pnpm install --no-frozen-lockfile

      - name: Publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          bun run scripts/release.ts --skip-build --publish
